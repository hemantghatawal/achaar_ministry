<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acharam</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="header">

<div class="branding">
<div class="logo">
<img src="images/logo.png" alt="Acharam logo">
</div>
<ul class="tagline" data-i18n="tagline">
<li>Homemade</li>
<li>Pure</li>
<li>Seasonal</li>
<li>On Order</li>
</ul>
</div>

<div class="language-switch">
<button id="lang-hi">हिंदी</button>
<button id="lang-en">English</button>
</div>

<input
type="text"
id="searchInput"
data-i18n-placeholder="search"
placeholder="Search achar..."
/>

<div id="categories"></div>

</header>

<main>

<div id="productsGrid" class="products-grid"></div>

</main>

<footer>

<button id="viewCart" data-i18n="cart">
View Cart
</button>

</footer>

<div id="cartModal" class="cart-modal"></div>

<script src="js/app.js"></script>
<script src="js/cart.js"></script>
<script src="js/filters.js"></script>
<script src="js/search.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/i18n.js"></script>
<script src="js/favorites.js"></script>

</body>
</html>
