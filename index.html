<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Acharam</title>

<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<header class="header">

<div class="branding">
<div class="logo">
<img src="images/logo.png" alt="Acharam logo">
</div>
<ul class="tagline" data-i18n="tagline">
<li>Homemade</li>
<li>Pure</li>
<li>Seasonal</li>
<li>On Order</li>
</ul>
</div>

<div class="language-switch">
<button id="lang-toggle">English</button>
</div>

<input
type="text"
id="searchInput"
data-i18n-placeholder="search"
placeholder="Search achar..."
/>

<div id="categories"></div>

</header>

<main>

<div id="productsGrid" class="products-grid">
  <div class="product-card">
    <img src="images/products/kairi-chatkara.png" alt="Kairi Chatkara" loading="lazy">
    <h3 class="product-title">Kairi Chatkara</h3>
    <div class="purchase-meta">
      <div class="weight-wrap">
        <span class="meta-label">Weight</span>
        <select class="weight-select"><option value="200gm">200gm</option><option value="500gm">500gm</option><option value="1kg">1kg</option></select>
      </div>
      <div class="price-chip">₹<span class="price-value">125</span></div>
    </div>
    <div class="purchase-row">
      <div class="qty-controls">
        <button type="button" class="qty-btn qty-minus">-</button>
        <input type="number" value="1" min="1" class="qty" readonly>
        <button type="button" class="qty-btn qty-plus">+</button>
      </div>
      <button class="add-cart" type="button">Add</button>
    </div>
  </div>

  <div class="product-card">
    <img src="images/products/kairi-shri.png" alt="Kairi Shri" loading="lazy">

      </div>
      <button class="add-cart" type="button">Add</button>
    </div>
  </div>

  <div class="product-card">
    <img src="images/products/kairi-kuta.png" alt="Kairi Kuta" loading="lazy">
    <h3 class="product-title">Kairi Kuta</h3>

    </div>

</main>

<footer>

<button id="viewCart" data-i18n="cart">
View Cart
</button>

</footer>

<div id="cartModal" class="cart-modal"></div>

<script src="js/app.js"></script>
<script src="js/cart.js"></script>
<script src="js/filters.js"></script>
<script src="js/search.js"></script>
<script src="js/whatsapp.js"></script>
<script src="js/i18n.js"></script>

</body>
</html>
